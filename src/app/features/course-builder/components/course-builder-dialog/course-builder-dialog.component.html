<h2 mat-dialog-title>{{ title() }}</h2>

<mat-dialog-content>
  @if (store.editorLoading()) {
    <div class="course-builder-dialog__state">
      <mat-spinner diameter="36" />
    </div>
  } @else {
    @if (store.error()) {
      <p class="course-builder-dialog__error">{{ store.error() }}</p>
    }

    <app-course-form
      [draft]="draft()"
      [readOnly]="store.isReadOnly()"
      (draftChange)="updateDraft($event)"
      (exportPdf)="exportPdf($event)"
    />
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Отмена</button>
  @if (!store.isReadOnly()) {
    <button mat-flat-button type="button" [disabled]="!dirty()" (click)="saveCourse()">
      Сохранить
    </button>
  }
</mat-dialog-actions>
