<h2 mat-dialog-title>{{ title() }}</h2>

<mat-dialog-content class="card-editor-dialog__content">
  @if (store.editorLoading()) {
    <div class="card-editor-dialog__state">
      <mat-spinner diameter="32" />
      <p>Загрузка карточки…</p>
    </div>
  } @else {
    @if (store.error()) {
      <p class="card-editor-dialog__error">{{ store.error() }}</p>
    }

    <section class="card-editor-dialog__toolbar">
      <mat-button-toggle-group
        class="card-editor-dialog__mode"
        [ngModel]="editorUxMode()"
        (ngModelChange)="setEditorUxMode($event)"
        aria-label="Режим редактора"
      >
        <mat-button-toggle value="basic">Базовый</mat-button-toggle>
        <mat-button-toggle value="advanced">Расширенный</mat-button-toggle>
      </mat-button-toggle-group>
    </section>

    @if (showWizard()) {
      <app-card-create-wizard
        [draft]="draft()"
        [knownLanguage]="indexMeta().knownLanguage"
        [learningLanguage]="indexMeta().learningLanguage"
        (draftChange)="updateDraft($event)"
        (expandToFull)="expandToFullEditor()"
      />
    } @else {
      <app-card-form
        [draft]="draft()"
        [previewId]="store.editingCardId() ?? 'preview-card'"
        [editorUxMode]="editorUxMode()"
        [knownLanguage]="indexMeta().knownLanguage"
        [learningLanguage]="indexMeta().learningLanguage"
        [defaultAppearance]="defaultAppearance()"
        (draftChange)="updateDraft($event)"
        (knownLanguageChange)="onKnownLanguageChange($event)"
        (learningLanguageChange)="onLearningLanguageChange($event)"
      />
    }
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Отмена</button>
  <button mat-flat-button type="button" [disabled]="store.editorLoading()" (click)="saveCard()">
    Сохранить
  </button>
</mat-dialog-actions>
