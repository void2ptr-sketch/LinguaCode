<mat-card class="learning-program-progress">
  <mat-card-header>
    <mat-card-title>Прогресс программы</mat-card-title>
    <mat-card-subtitle>{{ courseTitle() }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p class="learning-program-progress__meta">
      Сценарии: {{ completed() }} / {{ total() }} · {{ percent() }}%
    </p>
    <mat-progress-bar mode="determinate" [value]="percent()" />
  </mat-card-content>
</mat-card>
