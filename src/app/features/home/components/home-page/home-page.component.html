<section class="home-page">
  <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="home-page__tabs" aria-label="Главная">
    @for (tab of tabs; track tab.path) {
      <a
        mat-tab-link
        [routerLink]="tab.path"
        routerLinkActive
        #tabLink="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: tab.exact ?? false }"
        [active]="tabLink.isActive"
      >
        {{ tab.label }}
      </a>
    }
  </nav>

  <mat-tab-nav-panel #tabPanel class="home-page__panel">
    <router-outlet />
  </mat-tab-nav-panel>
</section>
