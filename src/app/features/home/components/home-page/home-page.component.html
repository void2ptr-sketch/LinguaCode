<mat-card class="page-card">
  <mat-card-header>
    <mat-card-title>Добро пожаловать, {{ displayName() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>Приложение для исследования и изучения языков.</p>
    <p>Выберите раздел в меню: карточки, инструменты или справку.</p>
    <p class="page-card__stats">
      Результаты обучения: {{ correctResults() }} / {{ totalResults() }}
    </p>
  </mat-card-content>
</mat-card>
