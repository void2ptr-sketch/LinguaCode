<button
  mat-button
  [matMenuTriggerFor]="helpMenu"
  class="menu-help__trigger"
  [class.menu-link--active]="isHelpSection()"
>
  <mat-icon>help_outline</mat-icon>
  Справка
</button>

<mat-menu #helpMenu="matMenu">
  <a mat-menu-item routerLink="/help" routerLinkActive="menu-link--active">
    <mat-icon>help_outline</mat-icon>
    <span>Справка</span>
  </a>
  <a mat-menu-item routerLink="/help/scenarios" routerLinkActive="menu-link--active">
    <mat-icon>stars</mat-icon>
    <span>Сценарии использования</span>
  </a>
</mat-menu>
