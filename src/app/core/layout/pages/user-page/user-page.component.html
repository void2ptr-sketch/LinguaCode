<mat-card class="page-card">
  <mat-card-header>
    <mat-card-title>Профиль пользователя</mat-card-title>
    <mat-card-subtitle>{{ displayName() }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="page-card__form">
    <mat-form-field appearance="outline">
      <mat-label>Имя</mat-label>
      <input matInput [(ngModel)]="nameDraft" name="displayName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Тема карточек</mat-label>
      <input matInput [(ngModel)]="themeDraft" name="theme" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Размер шрифта</mat-label>
      <mat-select [(ngModel)]="fontSizeDraft" name="fontSize">
        <mat-option value="sm">Маленький</mat-option>
        <mat-option value="md">Средний</mat-option>
        <mat-option value="lg">Большой</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button type="button" (click)="saveProfile()">Сохранить</button>
  </mat-card-actions>
</mat-card>
