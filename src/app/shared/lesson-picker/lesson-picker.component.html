@if (selectedCourseId()) {
  <section class="lesson-picker">
    <h3>Урок</h3>

    @if (loading()) {
      <mat-spinner diameter="32" />
    } @else if (error()) {
      <p class="lesson-picker__error">{{ error() }}</p>
    } @else if (lessonItems().length === 0) {
      <p class="lesson-picker__empty">В курсе пока нет уроков.</p>
    } @else {
      <ul class="lesson-picker__list">
        @for (item of lessonItems(); track item.lesson.id) {
          <li>
            <button
              type="button"
              class="lesson-picker__item"
              [disabled]="!item.unlocked"
              [class.lesson-picker__item--selected]="item.lesson.id === selectedLessonId()"
              [class.lesson-picker__item--locked]="!item.unlocked"
              [class.lesson-picker__item--completed]="item.completed"
              (click)="pick(item.lesson)"
            >
              <span class="lesson-picker__title-row">
                <span class="lesson-picker__title">{{ item.lesson.title }}</span>
                @if (item.completed) {
                  <mat-icon class="lesson-picker__badge" aria-label="Урок завершён">verified</mat-icon>
                }
              </span>
              <span class="lesson-picker__meta">
                @if (item.unlocked) {
                  {{ item.lesson.scenarioIds.length }} сценариев
                } @else if (item.blockReason) {
                  {{ item.blockReason }}
                }
              </span>
            </button>
          </li>
        }
      </ul>
    }
  </section>
}
