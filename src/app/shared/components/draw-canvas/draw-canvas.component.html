<div class="draw-canvas">
  <div class="draw-canvas__surface">
    @if (showHanziGhost()) {
      <svg
        class="draw-canvas__ghost"
        [attr.viewBox]="svgViewBox()"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <g [attr.transform]="hanziSvgTransform()">
          @for (stroke of hanziStrokes(); track stroke.strokeNum) {
            <path
              class="draw-canvas__ghost-stroke"
              [class.draw-canvas__ghost-stroke--radical]="stroke.isRadical"
              [attr.d]="stroke.path"
              [style.opacity]="ghostOpacity()"
            />
          }
        </g>
      </svg>
    }

    @if (showTracingAnimation()) {
      <svg
        class="draw-canvas__tracing"
        [attr.viewBox]="svgViewBox()"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <defs>
          @for (stroke of hanziStrokes(); track stroke.strokeNum) {
            <mask [attr.id]="tracingMaskId(stroke.strokeNum)">
              <path
                [attr.d]="tracingMaskPath(stroke.strokeNum)"
                stroke="white"
                [attr.stroke-width]="tracingMaskStrokeWidth"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </mask>
          }
        </defs>
        <g [attr.transform]="hanziSvgTransform()">
          @for (stroke of hanziStrokes(); track stroke.strokeNum) {
            @if (tracingStrokeVisible(stroke.strokeNum)) {
              <path
                class="draw-canvas__tracing-stroke"
                [attr.d]="stroke.path"
                [attr.mask]="'url(#' + tracingMaskId(stroke.strokeNum) + ')'"
                [style.opacity]="tracingStrokeOpacity(stroke.strokeNum)"
              />
            }
          }
        </g>
      </svg>
    }

    <canvas
      #canvas
      class="draw-canvas__canvas"
      [class.draw-canvas__canvas--disabled]="disabled()"
      [attr.aria-label]="radicalAriaLabel()"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp($event)"
      (pointerleave)="onPointerUp($event)"
      (pointercancel)="onPointerUp($event)"
    ></canvas>

    @if (showHanziGuides()) {
      <svg
        class="draw-canvas__guides"
        [attr.viewBox]="svgViewBox()"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        <g [attr.transform]="hanziSvgTransform()">
          @for (stroke of hanziStrokes(); track stroke.strokeNum) {
            <g class="draw-canvas__guide">
              <path [attr.d]="medianPath(stroke.points)" />
              <text
                class="draw-canvas__guide-order"
                [attr.x]="medianLabel(stroke.points).x"
                [attr.y]="medianLabel(stroke.points).y"
              >
                {{ stroke.strokeNum + 1 }}
              </text>
            </g>
          }
        </g>
      </svg>
    }

    @if (hanziLoadState() === 'loading' && hanziDataRequired()) {
      <div class="draw-canvas__overlay draw-canvas__overlay--loading" aria-live="polite">
        <mat-icon>hourglass_empty</mat-icon>
        <span>Загрузка черт…</span>
      </div>
    }

    @if (hanziLoadState() === 'missing' && hanziDataRequired()) {
      <div class="draw-canvas__overlay draw-canvas__overlay--missing" role="status">
        <mat-icon>info</mat-icon>
        <span>Данные черт недоступны</span>
      </div>
    }
  </div>

  <div class="draw-canvas__toolbar" role="toolbar" aria-label="Действия с рисунком">
    <button
      mat-button
      type="button"
      [disabled]="disabled() || !canUndo()"
      (click)="undoLastStroke()"
    >
      <mat-icon>undo</mat-icon>
      Отменить штрих
    </button>
    <button
      mat-button
      type="button"
      [disabled]="disabled() || !hasStrokes()"
      (click)="clearStrokes()"
    >
      <mat-icon>ink_eraser</mat-icon>
      Очистить
    </button>
    @if (showClearAll()) {
      <button
        mat-button
        type="button"
        [disabled]="disabled() || clearAllDisabled()"
        (click)="clearAllRequested.emit()"
      >
        <mat-icon>layers_clear</mat-icon>
        Очистить всё
      </button>
    }
  </div>
</div>
