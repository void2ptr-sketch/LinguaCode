<mat-card class="quiz-card quiz-card--font-{{ fontSize() }}">
  <section class="quiz-card__question" aria-label="Вопрос">
    <app-quiz-card-question-header
      [title]="card().title"
      [prompt]="resolved().prompt"
      [promptLexeme]="promptLexeme()"
    />
  </section>

  <section class="quiz-card__answer" aria-label="Ответ">
    <p class="quiz-card__section-label">Выберите ответ</p>
    <mat-card-content class="quiz-card__options">
      @for (option of resolved().options; track option; let index = $index) {
        <button type="button" [class]="optionClass(index)" (click)="selectOption(index)">
          <app-lexeme-display
            surface="answer"
            [lexeme]="optionLexeme(index)"
            [fallbackText]="option"
            [inline]="true"
          />
        </button>
      }
    </mat-card-content>
  </section>

  @if (feedback() === 'correct') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--correct">
      <mat-icon>check_circle</mat-icon>
      Верно!
    </mat-card-content>
  }

  @if (feedback() === 'incorrect') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--incorrect">
      <mat-icon>cancel</mat-icon>
      Неверно. Правильный ответ:
      <app-lexeme-display
        surface="answer"
        [lexeme]="optionLexeme(resolved().correctIndex)"
        [fallbackText]="resolved().options[resolved().correctIndex]"
        [inline]="true"
      />
    </mat-card-content>
  }

  <mat-card-actions align="end">
    @if (feedback() === null) {
      <button
        mat-flat-button
        type="button"
        [disabled]="selectedIndex() === null"
        (click)="checkAnswer.emit()"
      >
        Проверить
      </button>
    } @else {
      <button mat-flat-button type="button" (click)="nextCard.emit()">Далее</button>
    }
  </mat-card-actions>
</mat-card>
