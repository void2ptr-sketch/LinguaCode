<mat-card class="quiz-card quiz-card--font-{{ fontSize() }}">
  <mat-card-header>
    <mat-card-title>{{ card().title }}</mat-card-title>
    <mat-card-subtitle>
      <app-lexeme-display
        surface="prompt"
        [lexeme]="card().promptLexeme"
        [fallbackText]="resolved().prompt"
      />
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="quiz-card__options">
    @for (symbol of resolved().options; track symbol; let index = $index) {
      <button type="button" [class]="optionClass(index)" (click)="selectOption(index)">
        <app-lexeme-display
          surface="answer"
          [lexeme]="optionLexeme(index)"
          [fallbackText]="symbol"
          [inline]="true"
        />
      </button>
    }
  </mat-card-content>

  @if (feedback() === 'correct') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--correct">
      <mat-icon>check_circle</mat-icon>
      Верно!
    </mat-card-content>
  }

  @if (feedback() === 'incorrect') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--incorrect">
      <mat-icon>cancel</mat-icon>
      Неверно. Правильный символ:
      <app-lexeme-display
        surface="answer"
        [lexeme]="optionLexeme(resolved().correctIndex)"
        [fallbackText]="resolved().options[resolved().correctIndex]"
        [inline]="true"
      />
    </mat-card-content>
  }

  <mat-card-actions align="end">
    @if (feedback() === null) {
      <button mat-flat-button type="button" [disabled]="selectedIndex() === null" (click)="checkAnswer.emit()">
        Проверить
      </button>
    } @else {
      <button mat-flat-button type="button" (click)="nextCard.emit()">Далее</button>
    }
  </mat-card-actions>
</mat-card>
