<mat-card class="quiz-card quiz-card--font-{{ fontSize() }}">
  <mat-card-header>
    <mat-card-title>{{ card().title }}</mat-card-title>
    <mat-card-subtitle>{{ card().promptKnown }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <mat-form-field appearance="outline" class="quiz-card__field">
      <mat-label>Ваш ответ</mat-label>
      <input
        matInput
        [ngModel]="answerText()"
        [disabled]="feedback() !== null"
        (ngModelChange)="answerTextChange.emit($event)"
      />
    </mat-form-field>
  </mat-card-content>

  @if (feedback() === 'correct') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--correct">
      <mat-icon>check_circle</mat-icon>
      Верно!
    </mat-card-content>
  }

  @if (feedback() === 'incorrect') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--incorrect">
      <mat-icon>cancel</mat-icon>
      Неверно. Правильный ответ: {{ correctLabel() }}
    </mat-card-content>
  }

  <mat-card-actions align="end">
    @if (feedback() === null) {
      <button mat-flat-button type="button" [disabled]="!answerText().trim()" (click)="checkAnswer.emit()">
        Проверить
      </button>
    } @else {
      <button mat-flat-button type="button" (click)="nextCard.emit()">Далее</button>
    }
  </mat-card-actions>
</mat-card>
