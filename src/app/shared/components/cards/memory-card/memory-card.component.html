<mat-card class="quiz-card quiz-card--font-{{ fontSize() }}">
  <section class="quiz-card__question" aria-label="Вопрос">
    <mat-card-header>
      <mat-card-title>{{ card().title }}</mat-card-title>
      <mat-card-subtitle>
        <app-lexeme-display
          surface="prompt"
          [lexeme]="card().promptLexeme"
          [fallbackText]="card().promptKnown"
        />
      </mat-card-subtitle>
    </mat-card-header>
  </section>

  <section class="quiz-card__answer" aria-label="Ответ">
    <p class="quiz-card__section-label">Найдите пары</p>
    <mat-card-content class="memory-grid">
      @for (tile of tiles(); track tile.id) {
        <button type="button" mat-stroked-button class="memory-tile" (click)="flipTile(tile)">
          @if (isVisible(tile)) {
            <app-lexeme-display
              surface="answer"
              [lexeme]="tile.lexeme"
              [fallbackText]="tile.label"
              [inline]="true"
            />
          } @else {
            ?
          }
        </button>
      }
    </mat-card-content>
  </section>

  @if (feedback() === 'correct') {
    <mat-card-content class="quiz-card__feedback quiz-card__feedback--correct">
      <mat-icon>check_circle</mat-icon>
      Все пары найдены!
    </mat-card-content>
  }

  <mat-card-actions align="end">
    @if (feedback() === null) {
      <button mat-flat-button type="button" [disabled]="matched().length !== card().pairs.length" (click)="checkAnswer.emit()">
        Проверить
      </button>
    } @else {
      <button mat-flat-button type="button" (click)="nextCard.emit()">Далее</button>
    }
  </mat-card-actions>
</mat-card>
