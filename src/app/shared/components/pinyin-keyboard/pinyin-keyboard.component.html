<div class="pinyin-keyboard" role="group" aria-label="Клавиатура пиньинь">
  <p class="pinyin-keyboard__hint">
    Введите слог: после гласной выберите тон над клавиатурой; согласная продолжит слог.
  </p>

  <div
    class="pinyin-keyboard__row pinyin-keyboard__row--tones"
    [class.pinyin-keyboard__row--tones-active]="showToneRow()"
    [attr.aria-hidden]="showToneRow() ? null : true"
    aria-label="Выбор тона"
  >
    @for (tone of toneMarks; track tone) {
      <button
        mat-stroked-button
        type="button"
        class="pinyin-keyboard__key pinyin-keyboard__key--tone"
        [disabled]="isToneKeyDisabled()"
        [attr.aria-label]="showToneRow() ? toneAriaLabel(tone) : null"
        [attr.tabindex]="showToneRow() ? 0 : -1"
        (click)="pressTone(tone)"
      >
        @if (showToneRow()) {
          <app-tone-colored-text [text]="tonePreview(tone)" [fixedTone]="tone" [inline]="true" />
        } @else {
          <span class="pinyin-keyboard__tone-placeholder" aria-hidden="true">—</span>
        }
      </button>
    }
  </div>

  <div class="pinyin-keyboard__letters">
    @for (row of letterRows; track $index) {
      <div class="pinyin-keyboard__row">
        @for (key of row; track $index) {
          <button
            mat-stroked-button
            type="button"
            class="pinyin-keyboard__key"
            [disabled]="isKeyDisabled(key)"
            [attr.aria-label]="keyAriaLabel(key)"
            (click)="pressKey(key)"
          >
            {{ keyLabel(key) }}
          </button>
        }
      </div>
    }
  </div>

  <div class="pinyin-keyboard__row pinyin-keyboard__row--utility">
    @for (key of utilityKeys; track $index) {
      <button
        mat-stroked-button
        type="button"
        class="pinyin-keyboard__key pinyin-keyboard__key--wide"
        [disabled]="isKeyDisabled(key)"
        [attr.aria-label]="keyAriaLabel(key)"
        (click)="pressKey(key)"
      >
        @if (key.kind === 'backspace') {
          <mat-icon fontIcon="backspace" />
        } @else {
          {{ keyLabel(key) }}
        }
      </button>
    }
  </div>
</div>
