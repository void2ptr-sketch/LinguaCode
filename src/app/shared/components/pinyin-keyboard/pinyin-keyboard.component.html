<div class="pinyin-keyboard" role="group" aria-label="Клавиатура пиньинь">
  <p class="pinyin-keyboard__hint">Введите слог латиницей, затем выберите тон (1–5).</p>

  @for (row of layout; track $index) {
    <div class="pinyin-keyboard__row" [class.pinyin-keyboard__row--utility]="$index === layout.length - 1">
      @for (key of row; track $index) {
        <button
          mat-stroked-button
          type="button"
          class="pinyin-keyboard__key"
          [class.pinyin-keyboard__key--tone]="key.kind === 'tone'"
          [class.pinyin-keyboard__key--wide]="key.kind === 'space' || key.kind === 'backspace'"
          [disabled]="isKeyDisabled(key)"
          [attr.aria-label]="keyAriaLabel(key)"
          (click)="pressKey(key)"
        >
          @if (key.kind === 'backspace') {
            <mat-icon fontIcon="backspace" />
          } @else {
            {{ keyLabel(key) }}
          }
        </button>
      }
    </div>
  }
</div>
