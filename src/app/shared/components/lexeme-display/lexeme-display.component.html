@if (displayLexeme(); as item) {
  <div class="lexeme-display" [class.lexeme-display--inline]="inline()">
    <div class="lexeme-display__stack">
      @if (item.script === 'hani') {
        <span class="lexeme-display__primary lexeme-display__han" lang="zh-Hans">{{ item.primary }}</span>
      } @else {
        <span class="lexeme-display__primary">{{ item.primary }}</span>
      }

      @for (reading of visibleRomanizations(); track reading.system) {
        <div class="lexeme-display__reading lexeme-display__reading--{{ reading.system }}">
          {{ reading.reading }}
        </div>
      }

      @if (ipaText(); as ipa) {
        <app-phonetic-ipa [transcription]="ipa" [inline]="inline()" />
      }
    </div>
  </div>
} @else if (fallbackText()) {
  <span class="lexeme-display__primary">{{ fallbackText() }}</span>
}
