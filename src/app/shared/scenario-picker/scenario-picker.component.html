<section class="scenario-picker">
  <mat-form-field appearance="outline" class="scenario-picker__query">
    <mat-label>Поиск сценария</mat-label>
    <input matInput [ngModel]="query()" (ngModelChange)="onQueryChange($event)" />
  </mat-form-field>

  <mat-button-toggle-group
    class="scenario-picker__scope"
    [ngModel]="scope()"
    (ngModelChange)="onScopeChange($event)"
  >
    <mat-button-toggle value="published">Доступные</mat-button-toggle>
    <mat-button-toggle value="mine">Мои</mat-button-toggle>
    <mat-button-toggle value="all">Все</mat-button-toggle>
  </mat-button-toggle-group>

  @if (loading()) {
    <mat-spinner diameter="32" />
  } @else if (items().length === 0) {
    <div class="scenario-picker__empty-state">
      <mat-icon aria-hidden="true">view_list</mat-icon>
      <p class="scenario-picker__empty">Сценарии не найдены.</p>
    </div>
  } @else {
    <ul class="scenario-picker__list">
      @for (entry of items(); track entry.id) {
        <li>
          <button
            type="button"
            class="scenario-picker__item"
            [class.scenario-picker__item--selected]="entry.id === selectedScenarioId()"
            (click)="pick(entry)"
          >
            <span class="scenario-picker__title-row">
              <span class="scenario-picker__title">{{ entry.title }}</span>
              @if (entry.published) {
                <span class="scenario-picker__badge">опубликован</span>
              }
            </span>
            <span class="scenario-picker__meta">
              {{ entry.cardSourceSummary }}
              @if (entry.languagePairSummary) {
                · {{ entry.languagePairSummary }}
              }
            </span>
          </button>
        </li>
      }
    </ul>

    <app-pagination
      [length]="totalItems()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[5, 10, 25]"
      (pageChange)="onPageChange($event)"
    />
  }
</section>
