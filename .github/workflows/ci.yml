name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync hanzi assets
        run: npm run sync:hanzi

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build:prod

      - name: Unit and smoke tests
        run: npm run test:ci
